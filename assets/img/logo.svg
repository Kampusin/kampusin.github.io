<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kampusin logo">
  <!--
    Kampusin mark — geometric monogram formed from an academic arch + "K" strokes.
    Designed as a vector identity, not derived from emoji.
  -->
  <defs>
    <linearGradient id="kg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f766e"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <!-- rounded tile -->
  <rect width="120" height="120" rx="28" fill="url(#kg)"/>
  <!-- academic arch (graduation cap silhouette, abstracted) -->
  <path d="M24 50 L60 34 L96 50 L60 66 Z" fill="#ffffff" fill-opacity="0.95"/>
  <!-- cap tassel line -->
  <path d="M86 47 L86 72" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <circle cx="86" cy="75" r="3.5" fill="#fbbf24"/>
  <!-- "K" counter-form under the cap -->
  <path d="M44 70 L44 90 M44 78 L58 90 M44 78 L58 66" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
</svg>
