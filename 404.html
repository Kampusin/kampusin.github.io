<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self';">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="theme-color" content="#0f766e">
  <meta name="robots" content="noindex">
  <title>404 — Halaman Tidak Ditemukan · Kampusin</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Plus Jakarta Sans',-apple-system,system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fafaf9;color:#292524;padding:1.5rem}
    .wrap{text-align:center;max-width:420px}
    .brand{display:inline-flex;align-items:center;gap:.75rem;margin-bottom:2.5rem}
    .brand img{width:44px;height:44px;border-radius:10px}
    .brand span{font-size:1.125rem;font-weight:800;letter-spacing:-.03em;color:#1c1917}
    .brand .accent{color:#0d9488}
    .code{font-size:6rem;font-weight:800;line-height:1;letter-spacing:-.04em;background:linear-gradient(135deg,#0f766e,#14b8a6);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem}
    h1{font-size:1.5rem;font-weight:700;margin-bottom:.5rem;color:#1c1917}
    p{color:#78716c;font-size:.95rem;margin-bottom:2rem}
    .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.5rem;border-radius:10px;font-weight:600;font-size:.875rem;text-decoration:none;background:#0f766e;color:#fff;box-shadow:0 10px 30px -8px rgba(15,118,110,.35);transition:transform 180ms,background 180ms}
    .btn:hover{background:#115e59;transform:translateY(-1px)}
    .credit{margin-top:3rem;font-size:.75rem;color:#a8a29e}
    .credit strong{color:#57534e}
  </style>
</head>
<body>
  <div class="wrap">
    <a href="/" class="brand">
      <img src="/assets/img/logo.svg" alt="Kampusin">
      <span>Kampus<span class="accent">in</span></span>
    </a>
    <div class="code">404</div>
    <h1>Halaman tidak ditemukan</h1>
    <p>Maaf, halaman yang Anda cari tidak ada atau sudah dipindahkan. Silakan kembali ke beranda.</p>
    <a href="/" class="btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Kembali ke beranda
    </a>
    <div class="credit">© 2026 Kampusin · Dibangun oleh <strong>Nugraha Nastya</strong>, Yogyakarta</div>
  </div>
</body>
</html>
