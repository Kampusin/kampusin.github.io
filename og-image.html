<!--
  Template OG Image untuk Kampusin
  Ukuran: 1200 x 630 px (standar Facebook/WhatsApp/Twitter/LinkedIn)
  Cara pakai:
    1. Buka file ini di browser (Chrome/Edge)
    2. Klik kanan → "Save as" → pilih "Webpage, Image" (di Chrome)
       ATAU pakai ekstensi "GoFullPage" untuk screenshot full
       ATAU jalankan: node scripts/generate-og.js (kalau pakai @vercel/og)
    3. Simpan hasilnya sebagai public/og-image.png di repo kampusin.github.io
-->
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<title>OG Image Generator — Kampusin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
  .canvas {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #047857 0%, #10b981 50%, #34d399 100%);
    color: #fff;
    display: flex; flex-direction: column; justify-content: center;
    padding: 80px; position: relative;
  }
  .logo {
    font-size: 56px; font-weight: 800; letter-spacing: -1px; margin-bottom: 24px;
    display: flex; align-items: center; gap: 16px;
  }
  .logo .icon {
    width: 72px; height: 72px; border-radius: 16px;
    background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center; font-size: 40px;
  }
  .headline {
    font-size: 88px; font-weight: 800; line-height: 1.05; letter-spacing: -2px;
    max-width: 900px; margin-bottom: 28px;
  }
  .sub {
    font-size: 32px; font-weight: 400; opacity: 0.92; max-width: 800px; line-height: 1.4;
  }
  .url {
    position: absolute; bottom: 60px; left: 80px; font-size: 26px; font-weight: 600;
    opacity: 0.85;
  }
  .badges { position: absolute; bottom: 60px; right: 80px; display: flex; gap: 16px; }
  .badge {
    background: rgba(255,255,255,0.15); padding: 12px 24px; border-radius: 999px;
    font-size: 22px; font-weight: 600;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="logo"><span class="icon">🎓</span> Kampusin</div>
  <div class="headline">Sistem Informasi Akademik</div>
  <div class="sub">Jadwal kuliah, absensi, dan nilai — semua dalam satu tempat. Untuk mahasiswa &amp; dosen.</div>
  <div class="url">kampusin.github.io</div>
  <div class="badges">
    <span class="badge">📅 Jadwal</span>
    <span class="badge">✅ Absensi</span>
    <span class="badge">📊 Nilai</span>
  </div>
</div>
</body>
</html>
