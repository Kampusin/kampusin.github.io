<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://ohviyawkiwacafwodbbr.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="theme-color" content="#4f46e5">
  <meta name="robots" content="noindex">
  <title>Dashboard — Kampusin</title>
  <meta name="description" content="Dashboard akademik Kampusin.">

  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/img/logo.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/styles.css">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
  <style>
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .topbar { animation: fadeDown 0.8s var(--spring) forwards; }
    .sidebar { animation: fadeUp 0.8s var(--spring) forwards; }
  </style>
</head>
<body>

<div class="app" id="app">
  <!-- Sidebar backdrop (tablet) -->
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <a href="/dashboard.html" class="brand">
        <img src="/assets/img/logo.svg" alt="" class="brand-mark" width="40" height="40">
        <span class="brand-name">Kampus<span class="accent">in</span></span>
      </a>
    </div>

    <nav id="navMenu"><!-- populated by JS based on role --></nav>

    <div class="sidebar-footer">
      <div class="flex items-center gap-3" style="padding: var(--sp-2) var(--sp-3); margin-bottom: var(--sp-3);">
        <div class="avatar" id="sideAvatar">--</div>
        <div style="min-width:0;">
          <div class="text-sm" id="sideName" style="font-weight: 600; color: var(--text-strong); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">—</div>
          <div class="text-xs text-muted" id="sideRole" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">—</div>
        </div>
      </div>
      <button class="nav-item" id="logoutBtn">
        <span id="icLogout"></span>
        <span>Keluar</span>
      </button>
      <div class="credit" style="padding: var(--sp-3); margin-top: var(--sp-3);">
        Develop by <strong>Nugraha Nastya</strong><br>Yogyakarta · 2026
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <button class="btn btn-ghost menu-toggle" id="menuToggle" style="display:none; padding: var(--sp-2);">
        <span id="icMenu"></span>
      </button>
      <div class="topbar-title" id="topbarTitle">Dashboard</div>
      <div class="topbar-right">
        <div class="topbar-search">
          <span id="icSearch"></span>
          <input type="search" placeholder="Cari mata kuliah, nilai…" aria-label="Cari">
        </div>
        <button class="btn btn-ghost" style="position: relative;" aria-label="Notifikasi" onclick="Kampusin._toast('Tidak ada notifikasi baru.')">
          <span id="icBell"></span>
          <span class="dot dot-danger dot-pulse" style="position:absolute; top:8px; right:10px;"></span>
        </button>
        <a href="#/profile" class="avatar" id="topAvatar" data-nav="profile" style="cursor:pointer;">--</a>
      </div>
    </header>

    <main class="content" id="view"><!-- view rendered here --></main>
  </div>

  <!-- Bottom nav (mobile) -->
  <nav class="bottom-nav" id="bottomNav"><!-- populated by JS --></nav>
</div>

<script src="/assets/js/app.js"></script>
<script src="/assets/js/supabase-client.js"></script>
<script src="/assets/js/db.js"></script>
<script>
/* ============================================================
   Dashboard SPA router (backend-aware)
   ============================================================ */
(function() {
  const K = window.Kampusin;
  const DB = window.KampusinDB;
  const I = K.icons;

  // ---- Auth guard ----
  // Dukung dua mode: mock (lama) atau Supabase (backend)
  let session = K.getSession();
  let sbToken = KampusinBackend.getToken();
  if (!session && !sbToken) { window.location.href = '/'; return; }

  // Tentukan role. Untuk Supabase, kita perlu fetch profil dulu.
  // Sementara loading, pakai mock data sebagai placeholder.
  let role = session ? session.role : 'mahasiswa';
  let profile = null;
  let _backendProfile = null; // diisi async setelah fetch

  // Kalau Supabase mode, decode role dari JWT tidak reliable (RLS saja yang tahu),
  // jadi kita simpan role di localStorage saat login.
  if (!session && sbToken) {
    // Baca role dari cache lokal (diset saat login berhasil)
    const cachedRole = localStorage.getItem('kampusin_role');
    role = cachedRole || 'mahasiswa';
    // Buat session mock supaya UI tetap render
    session = { role };
    // Profile placeholder sambil fetch
    profile = {
      avatar: '—', name: 'Memuat…', email: '',
      nim: '', prodi: '', semester: 0, ipk: 0, sksLulus: 0,
    };
  } else {
    const user = K.getCurrentUser();
    if (!user) { K.logout(); return; }
    profile = user.profile;
  }

  // ---- Inject icons into static markup ----
  document.getElementById('icLogout').innerHTML = I.logout;
  document.getElementById('icMenu').innerHTML = I.menu;
  document.getElementById('icSearch').innerHTML = I.search;
  document.getElementById('icBell').innerHTML = I.bell;

  // ---- Avatar / sidebar identity ----
  document.getElementById('sideAvatar').textContent = profile.avatar;
  document.getElementById('sideName').textContent = profile.name;
  document.getElementById('sideRole').textContent = role === 'mahasiswa'
    ? `${profile.nim} · ${profile.prodi}`
    : `${profile.nidn} · ${profile.jabatan}`;
  document.getElementById('topAvatar').textContent = profile.avatar;

  // ---- Build nav based on role ----
  const NAV = {
    mahasiswa: [
      { id:'dashboard', label:'Beranda', icon:'dashboard' },
      { id:'schedule', label:'Jadwal Kuliah', icon:'schedule' },
      { id:'attendance', label:'Absensi', icon:'attendance' },
      { id:'grades', label:'Nilai', icon:'grades' },
      { id:'courses', label:'Mata Kuliah', icon:'courses' },
      { id:'announce', label:'Pengumuman', icon:'announce', badge: K.ANNOUNCEMENTS.filter(a=>a.priority==='high').length },
      { id:'profile', label:'Profil', icon:'profile' },
    ],
    dosen: [
      { id:'dashboard', label:'Beranda', icon:'dashboard' },
      { id:'schedule', label:'Jadwal Mengajar', icon:'schedule' },
      { id:'attendance', label:'Sesi Absensi', icon:'attendance' },
      { id:'courses', label:'Mata Kuliah', icon:'courses' },
      { id:'students', label:'Mahasiswa Bimbingan', icon:'students' },
      { id:'announce', label:'Pengumuman', icon:'announce' },
      { id:'profile', label:'Profil', icon:'profile' },
    ],
  };

  // Mobile bottom nav = first 4 items
  const BOTTOM_NAV_IDS = role === 'mahasiswa'
    ? ['dashboard','schedule','attendance','grades']
    : ['dashboard','schedule','attendance','students'];

  function buildSidebarNav() {
    const items = NAV[role];
    let html = '<div class="nav-section"><div class="nav-section-title">Menu utama</div>';
    items.forEach(it => {
      const badge = it.badge ? `<span class="badge badge-danger">${it.badge}</span>` : '';
      html += `<button class="nav-item" data-nav="${it.id}">${I[it.icon]}<span>${it.label}</span>${badge}</button>`;
    });
    html += '</div>';
    document.getElementById('navMenu').innerHTML = html;
  }

  function buildBottomNav() {
    const items = NAV[role].filter(it => BOTTOM_NAV_IDS.includes(it.id));
    let html = '';
    items.forEach(it => {
      const badge = it.badge ? `<span class="badge badge-danger">${it.badge}</span>` : '';
      html += `<button class="bottom-nav-item" data-nav="${it.id}">${I[it.icon]}<span>${it.label}</span>${badge}</button>`;
    });
    // Add "More" leading to profile/announce on mobile
    html += `<button class="bottom-nav-item" data-nav="profile">${I.profile}<span>Lainnya</span></button>`;
    document.getElementById('bottomNav').innerHTML = html;
  }

  buildSidebarNav();
  buildBottomNav();

  // ---- Navigation ----
  function setActiveNav(id) {
    document.querySelectorAll('[data-nav]').forEach(el => {
      el.classList.toggle('active', el.dataset.nav === id);
    });
  }
  function navigate(id) {
    if (window.location.hash !== `#/${id}`) {
      window.location.hash = `/${id}`;
    } else {
      render(id);
    }
  }
  document.addEventListener('click', (e) => {
    const t = e.target.closest('[data-nav]');
    if (!t) return;
    e.preventDefault();
    navigate(t.dataset.nav);
    // Close mobile sidebar
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarBackdrop').classList.remove('show');
  });

  // Hash router
  function routeFromHash() {
    const h = window.location.hash.replace('#/','') || 'dashboard';
    const valid = NAV[role].some(n => n.id === h);
    render(valid ? h : 'dashboard');
  }
  window.addEventListener('hashchange', routeFromHash);

  // Mobile sidebar toggle
  document.getElementById('menuToggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarBackdrop').classList.toggle('show');
  });
  document.getElementById('sidebarBackdrop').addEventListener('click', () => {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarBackdrop').classList.remove('show');
  });

  // Logout
  document.getElementById('logoutBtn').addEventListener('click', () => {
    if (confirm('Keluar dari akun?')) DB.logout();
  });

  // ---- Async backend init (Supabase mode) ----
  // Kalau login via Supabase, fetch profil asli lalu re-render UI
  (async () => {
    if (!sbToken) return; // mode mock, skip
    try {
      const p = await DB.getMyProfile();
      if (p) {
        _backendProfile = p;
        profile = {
          id: p.id,
          avatar: p.avatar_initials || (p.full_name || '?').slice(0,2).toUpperCase(),
          name: p.full_name || 'Pengguna',
          email: p.email || '',
          nim: p.nim || '', prodi: p.prodi || '', fakultas: p.fakultas || '',
          angkatan: p.angkatan, semester: p.semester,
          nidn: p.nidn || '', jabatan: p.jabatan || '',
          ipk: parseFloat(p.ipk) || 0, sksLulus: p.sks_lulus || 0,
          sksTotal: 144,
          dosenPa: '—',
          mataKuliahCount: 0, mahasiswaBimbingan: 0,
        };
        role = p.role || role;
        session = { role, email: p.email, name: p.full_name, loginAt: Date.now() };
        // refresh avatar + sidebar
        document.getElementById('sideAvatar').textContent = profile.avatar;
        document.getElementById('sideName').textContent = profile.name;
        document.getElementById('sideRole').textContent = role === 'mahasiswa'
          ? `${profile.nim || '-'} · ${profile.prodi || '-'}`
          : `${profile.nidn || '-'} · ${profile.jabatan || '-'}`;
        document.getElementById('topAvatar').textContent = profile.avatar;
        // Rebuild nav (role mungkin berubah)
        buildSidebarNav(); buildBottomNav();
        routeFromHash(); // re-render current view with real data
      }
    } catch (err) {
      console.warn('[Kampusin] Gagal fetch profil backend:', err.message);
      // Kalau token expired/invalid, logout
      if (err.status === 401) { DB.logout(); }
    }
  })();

  // ---- VIEW RENDERERS ----
  const TITLES = {
    dashboard:'Beranda', schedule: role==='dosen'?'Jadwal Mengajar':'Jadwal Kuliah',
    attendance: role==='dosen'?'Sesi Absensi':'Absensi', grades:'Nilai Akademik',
    courses:'Mata Kuliah', students:'Mahasiswa Bimbingan', announce:'Pengumuman', profile:'Profil',
  };

  function render(id) {
    setActiveNav(id);
    document.getElementById('topbarTitle').textContent = TITLES[id] || 'Dashboard';
    const fn = VIEWS[id] || VIEWS.dashboard;
    const html = fn();
    const el = document.getElementById('view');
    el.innerHTML = `<div class="view" style="perspective: 1000px;">${html}</div>`;
    el.scrollTop = 0;
    
    // Initialize VanillaTilt for elements with data-tilt
    if (window.innerWidth > 768) {
      setTimeout(() => {
        const tiltEls = el.querySelectorAll('[data-tilt]');
        if (tiltEls.length) {
          VanillaTilt.init(tiltEls, { max: 5, speed: 400, glare: true, "max-glare": 0.1 });
        }
      }, 50);
    }

    // Call afterRender hook if exists (for charts etc)
    if (VIEWS[`${id}_afterRender`]) {
      setTimeout(VIEWS[`${id}_afterRender`], 100);
    }

    // Async refresh from backend (replace mock data with real data)
    if (VIEWS._async) VIEWS._async(id);
  }

  // ---- Async backend refresh ----
  // Untuk tiap view, setelah render mock, coba fetch data backend & re-render
  VIEWS._async = async function(id) {
    if (!sbToken) return; // mode mock, skip
    try {
      // Override K.ANNOUNCEMENTS dengan data backend
      const ann = await DB.getAnnouncements();
      if (ann && ann.length) K.ANNOUNCEMENTS = ann;
    } catch (e) { /* abaikan, pakai mock */ }
    // Hanya re-render kalau data berubah signifikan (pengumuman)
    if (id === 'announce' || id === 'dashboard') {
      const fn = VIEWS[id];
      const el = document.getElementById('view');
      el.innerHTML = `<div class="view">${fn()}</div>`;
    }
  };

  /* ---------- shared components ---------- */
  function pageHead(title, sub) {
    return `<div class="page-head"><h1>${title}</h1>${sub?`<p>${sub}</p>`:''}</div>`;
  }
  function welcome() {
    const h = new Date().getHours();
    if (h < 11) return 'Selamat pagi';
    if (h < 15) return 'Selamat siang';
    if (h < 19) return 'Selamat sore';
    return 'Selamat malam';
  }
  function firstName(name) { return name.split(' ')[0]; }

  /* ============================================================
     MAHASISWA VIEWS
     ============================================================ */
  const VIEWS = {};

  VIEWS.dashboard = function() {
    if (role === 'dosen') return VIEWS._dosenDashboard();
    // ---- Student dashboard ----
    const todayName = K.DAYS[(new Date('2026-07-20').getDay()+6)%7]; // Monday demo
    const todayClasses = K.SCHEDULE.mahasiswa.filter(s => s.day === todayName);
    const attAvg = Math.round(K.ATTENDANCE_SUMMARY.reduce((a,c)=>a+K.attRate(c),0) / K.ATTENDANCE_SUMMARY.length);
    const sksPercent = Math.round(profile.sksLulus / profile.sksTotal * 100);

    // --- BENTO GRID START ---
    html += `<div class="bento-grid">
    
      <!-- Welcome Card (Span 2 cols) -->
      <div class="bento-item col-2">
        <div class="bento-header">
          <div>
            <h3>Selamat Datang</h3>
            <h2 style="font-size: var(--fs-xl); color: var(--text-strong); margin-top:4px;">${firstName(profile.name)}</h2>
          </div>
          <div class="bento-icon" style="color:var(--brand-600);">${I.profile}</div>
        </div>
        <div class="text-sm text-muted" style="margin-top:auto;">Semester ${profile.semester} · ${profile.prodi}</div>
      </div>
      
      <!-- IPK Card -->
      <div class="bento-item col-1">
        <div class="bento-header">
          <h3>IPK Kumulatif</h3>
          <div class="bento-icon" style="color:var(--brand-600);">${I.grades}</div>
        </div>
        <div class="bento-value">${profile.ipk.toFixed(2)}</div>
        <div class="bento-desc"><span class="trend">+0.12</span> sem ini</div>
      </div>
      
      <!-- Attendance Card -->
      <div class="bento-item col-1">
        <div class="bento-header">
          <h3>Kehadiran</h3>
          <div class="bento-icon" style="color:var(--success);">${I.attendance}</div>
        </div>
        <div class="bento-value">${attAvg}%</div>
        <div class="bento-desc"><span class="trend" style="color:var(--stone-600); background:var(--stone-200);">Stabil</span></div>
      </div>
      
      <!-- SKS Card -->
      <div class="bento-item col-1">
        <div class="bento-header">
          <h3>SKS Lulus</h3>
          <div class="bento-icon" style="color:var(--warning);">${I.courses}</div>
        </div>
        <div class="bento-value">${profile.sksLulus}<span style="font-size:var(--fs-md); color:var(--stone-400);">/${profile.sksTotal}</span></div>
        <div class="progress" style="margin-top: var(--sp-4);"><div class="progress-bar" style="width:${sksPercent}%"></div></div>
      </div>
      
      <!-- Chart Card (Span 3 cols, Span 2 rows) -->
      <div class="bento-item col-3 row-2 bento-chart">
        <div class="bento-header" style="margin-bottom:0;">
          <div>
            <h3>Analitik Akademik</h3>
            <div class="text-sm text-muted">Perkembangan IPK dan Kehadiran 4 Semester Terakhir</div>
          </div>
          <span class="badge badge-brand">Semester 4</span>
        </div>
        <div class="bento-chart-container">
          <canvas id="dashboardChart"></canvas>
        </div>
      </div>
      
      <!-- Today's Schedule Card -->
      <div class="bento-item col-2 row-2">
        <div class="bento-header">
          <div>
            <h3>Jadwal Hari Ini</h3>
            <div class="text-xs text-muted">${todayName}, 20 Jul 2026</div>
          </div>
          <div class="bento-icon" style="color:var(--info);">${I.schedule}</div>
        </div>
        <div class="list-group" style="flex:1; overflow-y:auto;">`;

    if (todayClasses.length === 0) {
      html += `<div style="text-align:center; padding:var(--sp-6); color:var(--stone-400);">Tidak ada kelas hari ini. Waktunya istirahat.</div>`;
    } else {
      todayClasses.forEach(c => {
        html += `<div class="list-item">
          <div class="list-icon"></div>
          <div class="list-content">
            <div class="list-title">${c.name}</div>
            <div class="list-subtitle">${c.start} - ${c.end} · ${c.room}</div>
          </div>
          <span class="badge badge-neutral">${c.code}</span>
        </div>`;
      });
    }
        
    html += `</div>
      </div>
      
      <!-- Announcements Card -->
      <div class="bento-item col-2 row-2">
        <div class="bento-header">
          <h3>Pengumuman Terbaru</h3>
          <a href="#/announce" data-nav="announce" class="text-xs text-muted" style="font-weight:700;">Lihat Semua</a>
        </div>
        <div class="list-group" style="flex:1; overflow-y:auto;">`;
        
    const topAnn = K.ANNOUNCEMENTS.slice(0,3);
    topAnn.forEach(a => {
      const badge = a.priority==='high' ? '<span class="badge badge-danger">Penting</span>' : '';
      html += `<div class="list-item" style="align-items:flex-start;">
        <div class="list-content">
          <div class="flex justify-between items-center gap-2">
            <div class="list-title" style="white-space:normal; line-height:1.4;">${a.title}</div>
            ${badge}
          </div>
          <div class="list-subtitle" style="margin-top:8px;">${K.relTime(a.date)} · ${a.author}</div>
        </div>
      </div>`;
    });
        
    html += `</div>
      </div>
      
    </div>`;
    // --- BENTO GRID END ---

    return html;
  };

  VIEWS.dashboard_afterRender = function() {
    const ctx = document.getElementById('dashboardChart');
    if (!ctx) return;
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Smt 1', 'Smt 2', 'Smt 3', 'Smt 4'],
        datasets: [{
          label: 'IPK',
          data: [3.5, 3.7, 3.65, 3.8],
          backgroundColor: 'rgba(99, 102, 241, 0.8)',
          borderRadius: 6,
          borderSkipped: false
        }, {
          label: 'Kehadiran (%)',
          data: [95, 92, 98, 96],
          type: 'line',
          borderColor: '#10b981',
          tension: 0.4,
          borderWidth: 3,
          pointBackgroundColor: '#ffffff',
          pointBorderColor: '#10b981'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom', labels: { usePointStyle: true, boxWidth: 8 } }
        },
        scales: {
          y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' } },
          x: { grid: { display: false } }
        }
      }
    });
  };

  VIEWS.schedule = function() {
    const data = K.SCHEDULE[role];
    let html = pageHead(role==='dosen'?'Jadwal Mengajar':'Jadwal Kuliah',
      'Semester Ganjil 2026/2027 · Perubahan jadwal akan diberitahukan via pengumuman.');

    // Group by day
    html += '<div class="flex flex-col gap-4">';
    K.DAYS.forEach(day => {
      const dayClasses = data.filter(s => s.day === day);
      if (dayClasses.length === 0) return;
      html += `<div class="card">
        <div class="card-header"><h3 style="display:flex; align-items:center; gap:var(--sp-2);">${I.calendar} ${day}</h3></div>
        <div>`;
      dayClasses.forEach(c => {
        const isDosen = role==='dosen';
        const meta = isDosen ? `Kelas ${c.class}` : c.lecturer;
        html += `<div class="flex items-center gap-4" style="padding: var(--sp-4) var(--sp-6); border-bottom: 1px solid var(--stone-100);">
          <div style="text-align:center; min-width:64px;">
            <div class="mono" style="font-weight:700; color:var(--brand-700); font-size:var(--fs-sm);">${c.start}</div>
            <div class="text-xs text-muted">${c.end}</div>
          </div>
          <div style="width:1px; background: var(--border); align-self:stretch;"></div>
          <div style="flex:1; min-width:0;">
            <div style="font-weight:600; color:var(--text-strong);">${c.name}</div>
            <div class="text-xs text-muted flex items-center gap-2" style="margin-top:2px; flex-wrap:wrap;">
              <span class="mono">${c.code}</span> · ${meta} · ${c.room}
            </div>
          </div>
        </div>`;
      });
      html += '</div></div>';
    });
    html += '</div>';
    return html;
  };

  VIEWS.attendance = function() {
    if (role === 'dosen') return VIEWS._dosenAttendance();

    let html = pageHead('Rekam Kehadiran', 'Rekap kehadiran per mata kuliah semester ini.');

    // Summary cards
    const totalHadir = K.ATTENDANCE_SUMMARY.reduce((a,c)=>a+c.hadir,0);
    const totalAlpha = K.ATTENDANCE_SUMMARY.reduce((a,c)=>a+c.alpha,0);
    const totalSakit = K.ATTENDANCE_SUMMARY.reduce((a,c)=>a+c.sakit,0);
    const totalIzin = K.ATTENDANCE_SUMMARY.reduce((a,c)=>a+c.izin,0);
    const totalAll = K.ATTENDANCE_SUMMARY.reduce((a,c)=>a+c.total,0);
    const rate = Math.round(totalHadir/totalAll*100);

    html += `<div class="stats-grid" style="grid-template-columns: repeat(4, 1fr); margin-bottom: var(--sp-6);">
      <div class="stat-card"><div class="stat-value" style="color:var(--brand-600);">${rate}%</div><div class="stat-label">Kehadiran total</div></div>
      <div class="stat-card"><div class="stat-value">${totalHadir}</div><div class="stat-label">Hadir</div></div>
      <div class="stat-card"><div class="stat-value">${totalIzin + totalSakit}</div><div class="stat-label">Izin & sakit</div></div>
      <div class="stat-card"><div class="stat-value" style="color:${totalAlpha>2?'var(--danger)':'var(--text-strong)'};">${totalAlpha}</div><div class="stat-label">Alpha</div></div>
    </div>`;

    // Per-course breakdown
    html += `<div class="card" style="margin-bottom: var(--sp-4);">
      <div class="card-header"><h3>Rincian per mata kuliah</h3></div>
      <div class="table-wrap"><table class="table">
        <thead><tr><th>Mata Kuliah</th><th>Hadir</th><th>Izin</th><th>Sakit</th><th>Alpha</th><th>Rate</th></tr></thead>
        <tbody>`;
    K.ATTENDANCE_SUMMARY.forEach(r => {
      const rate = K.attRate(r); const color = K.attColor(rate);
      html += `<tr>
        <td><div style="font-weight:600;">${r.name}</div><div class="text-xs text-muted mono">${r.code}</div></td>
        <td>${r.hadir}/${r.total}</td>
        <td>${r.izin}</td><td>${r.sakit}</td><td>${r.alpha||'—'}</td>
        <td><div class="flex items-center gap-2"><div class="progress" style="width:60px;"><div class="progress-bar" style="width:${rate}%; background:${color};"></div></div><span style="font-weight:600; color:${color}; min-width:36px;">${rate}%</span></div></td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;

    // Recent log
    html += `<div class="card">
      <div class="card-header"><h3>Riwayat terbaru</h3></div>
      <div>`;
    K.ATTENDANCE_LOG.slice(0,6).forEach(l => {
      html += `<div class="flex items-center gap-3" style="padding: var(--sp-3) var(--sp-6); border-bottom: 1px solid var(--stone-100);">
        <div style="min-width:64px; text-align:center;">
          <div style="font-weight:700; color:var(--text-strong); font-size:var(--fs-sm);">${new Date(l.date+'T00:00:00').getDate()}</div>
          <div class="text-xs text-muted">${new Date(l.date+'T00:00:00').toLocaleDateString('id-ID',{month:'short'})}</div>
        </div>
        <div style="flex:1; min-width:0;">
          <div style="font-weight:600; color:var(--text-strong); font-size:var(--fs-sm);">${l.name}</div>
          <div class="text-xs text-muted mono">${l.code} · ${l.time!=='—'?'check-in '+l.time:'tidak hadir'}</div>
        </div>
        ${K.statusBadge(l.status)}
      </div>`;
    });
    html += '</div></div>';
    return html;
  };

  VIEWS.grades = function() {
    let html = pageHead('Nilai Akademik', 'Riwayat nilai per semester. Klik unduh untuk KHS.');

    // Summary
    html += `<div class="stats-grid" style="grid-template-columns: repeat(3,1fr); margin-bottom: var(--sp-6);">
      <div class="stat-card"><div class="stat-value">${profile.ipk.toFixed(2)}</div><div class="stat-label">IPK kumulatif</div></div>
      <div class="stat-card"><div class="stat-value">${profile.sksLulus}</div><div class="stat-label">Total SKS lulus</div></div>
      <div class="stat-card"><div class="stat-value">${Object.keys(K.GRADES).length}</div><div class="stat-label">Semester tercatat</div></div>
    </div>`;

    Object.entries(K.GRADES).forEach(([sem, rows]) => {
      const totalSks = rows.reduce((a,c)=>a+c.sks,0);
      const totalBobot = rows.reduce((a,c)=>a+c.angka*c.sks,0);
      const ips = (totalBobot/totalSks).toFixed(2);
      html += `<div class="card" style="margin-bottom: var(--sp-4);">
        <div class="card-header flex items-center justify-between">
          <h3>${sem}</h3>
          <div class="flex items-center gap-3">
            <span class="badge badge-brand">IPS ${ips}</span>
            <span class="badge badge-neutral">${totalSks} SKS</span>
            <button class="btn btn-secondary" style="padding: var(--sp-2) var(--sp-3); min-height: 32px; font-size: var(--fs-xs);" onclick="Kampusin._toast('KHS ${sem} diunduh (demo).')">${I.download} KHS</button>
          </div>
        </div>
        <div class="table-wrap"><table class="table">
          <thead><tr><th>Kode</th><th>Mata Kuliah</th><th>SKS</th><th>Nilai</th><th>Bobot</th></tr></thead>
          <tbody>`;
      rows.forEach(r => {
        const nilaiColor = r.angka>=3.5?'var(--success)':r.angka>=3?'var(--warning)':'var(--danger)';
        html += `<tr>
          <td class="mono">${r.code}</td>
          <td><div style="font-weight:500;">${r.name}</div></td>
          <td>${r.sks}</td>
          <td><span class="badge" style="background:var(--stone-100); color:${nilaiColor}; font-weight:700;">${r.nilai}</span></td>
          <td class="mono">${r.angka.toFixed(1)}</td>
        </tr>`;
      });
      html += `</tbody></table></div></div>`;
    });

    return html;
  };

  VIEWS.courses = function() {
    const data = role==='dosen' ? K.DOSEN_COURSES : K.COURSES;
    let html = pageHead('Mata Kuliah', role==='dosen' ? 'Mata kuliah yang Anda ampu semester ini.' : 'Mata kuliah yang Anda ambil semester ini.');

      html += `<div class="card card-pad" style="display:flex; flex-direction:column; gap:var(--sp-2);">
        <div class="flex items-center justify-between">
          <span class="badge badge-brand mono">${c.code}</span>
          <span class="badge badge-neutral">${nextOrDone}</span>
        </div>
        <h3 style="margin-top: var(--sp-2);">${c.name}</h3>
        <div class="text-xs text-muted">${meta}</div>
        <div style="margin-top: var(--sp-2);">
          <div class="flex justify-between text-xs text-muted" style="margin-bottom:4px;"><span>Progres semester</span><span style="font-weight:600;">${progress}%</span></div>
          <div class="progress"><div class="progress-bar" style="width:${progress}%"></div></div>

  VIEWS.students = function() {
    let html = pageHead('Mahasiswa Bimbingan', `${K.BIMBINGAN.length} mahasiswa di bawah bimbingan Anda sebagai Dosen PA.`);

    html += `<div class="card">
      <div class="table-wrap"><table class="table">

  VIEWS.announce = function() {
    let html = pageHead('Pengumuman', 'Informasi resmi dari kampus. Klik untuk detail.');

    const sorted = [...K.ANNOUNCEMENTS].sort((a,b) => (b.pinned?1:0)-(a.pinned?1:0) || b.date.localeCompare(a.date));

      const priorityBadge = a.priority==='high' ? '<span class="badge badge-danger">Penting</span>' : '<span class="badge badge-neutral">Umum</span>';
      const pinIcon = a.pinned ? `<span style="color:var(--accent-500);"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16 9V4h1c.55 0 1-.45 1-1s-.45-1-1-1H7c-.55 0-1 .45-1 1s.45 1 1 1h1v5c0 1.66-1.34 3-3 3v2h5.97v7l1 1 1-1v-7H19v-2c-1.66 0-3-1.34-3-3z"/></svg></span>` : '';

        <div class="flex items-start justify-between gap-3" style="margin-bottom: var(--sp-2);">
          <div style="flex:1;">
            <div class="flex items-center gap-2" style="margin-bottom:4px;">
              ${pinIcon}
              <h3 style="font-size:var(--fs-md);">${a.title}</h3>
            </div>
            <div class="text-xs text-muted">${K.fmtDate(a.date)} · ${a.author}</div>
          </div>
          ${priorityBadge}
        </div>
        <p class="text-sm announce-body" style="margin-top: var(--sp-2); color: var(--text);">${a.body}</p>
      </article>`;
    });
    html += '</div>';
    return html;
  };

  VIEWS.profile = function() {
    const p = profile;
    let html = pageHead('Profil', 'Informasi akademik Anda.');

    html += `<div class="grid-2">
      <div class="card card-pad" style="text-align:center;">
        <div class="avatar avatar-xl" style="margin: 0 auto var(--sp-4); font-size: var(--fs-2xl); width:96px; height:96px;">${p.avatar}</div>
        <h2 style="margin-bottom: var(--sp-1);">${p.name}</h2>
        <p class="text-muted text-sm" style="margin-bottom: var(--sp-4);">${role==='mahasiswa'?p.nim:p.nidn} · ${p.prodi}</p>
        <div class="flex items-center justify-center gap-2" style="flex-wrap:wrap;">
          <span class="badge badge-brand">${role==='mahasiswa'?'Mahasiswa':'Dosen'}</span>
          ${role==='mahasiswa'?`<span class="badge badge-neutral">Semester ${p.semester}</span>`:`<span class="badge badge-neutral">${p.jabatan}</span>`}
        </div>

        <div class="stats-grid" style="grid-template-columns: 1fr 1fr; margin: 0;">
          <div><div class="stat-value">${p.ipk.toFixed(2)}</div><div class="stat-label">IPK</div></div>
          <div><div class="stat-value">${p.sksLulus}</div><div class="stat-label">SKS lulus</div></div>
        </div>` : ''}

      <div class="card">
        <div class="card-header"><h3>Detail akademik</h3></div>
        <div>`;
    const rows = role==='mahasiswa' ? [
      ['Email', p.email], ['NIM', p.nim], ['Program Studi', p.prodi], ['Fakultas', p.fakultas],
      ['Angkatan', p.angkatan], ['Semester', p.semester], ['Dosen PA', p.dosenPa], ['Status', 'Aktif'],
    ] : [
      ['Email', p.email], ['NIDN', p.nidn], ['Jabatan', p.jabatan], ['Program Studi', p.prodi],
      ['Fakultas', p.fakultas], ['Mata Kuliah', p.mataKuliahCount + ' pengampu'], ['Mahasiswa Bimbingan', p.mahasiswaBimbingan + ' orang'],
    ];
    rows.forEach(([k,v]) => {
      html += `<div class="flex justify-between" style="padding: var(--sp-3) var(--sp-6); border-bottom: 1px solid var(--stone-100); gap: var(--sp-4);">
        <span class="text-sm text-muted">${k}</span>
        <span class="text-sm" style="font-weight:500; text-align:right;">${v}</span>
      </div>`;
    });
    html += `</div></div></div>`;

  };

  /* ============================================================
     DOSEN-SPECIFIC VIEWS
     ============================================================ */
  VIEWS._dosenDashboard = function() {
    const todayName = K.DAYS[(new Date('2026-07-20').getDay()+6)%7];
    const todayClasses = K.SCHEDULE.dosen.filter(s => s.day === todayName);
    const totalStudents = K.DOSEN_COURSES.reduce((a,c)=>a+c.students,0);

    let html = pageHead(`${welcome()}, ${firstName(profile.name)}`,
      `${profile.jabatan} · ${profile.prodi}`);

    // --- BENTO GRID START ---
    html += `<div class="bento-grid">
    
      <!-- Welcome Card (Span 2 cols) -->
      <div class="bento-item col-2">
        <div class="bento-header">
          <div>
            <h3>Selamat Datang,</h3>
            <h2 style="font-size: var(--fs-xl); color: var(--text-strong); margin-top:4px;">${firstName(profile.name)}</h2>
          </div>
          <div class="bento-icon" style="color:var(--brand-600);">${I.profile}</div>
        </div>
        <div class="text-sm text-muted" style="margin-top:auto;">${profile.jabatan} · ${profile.prodi}</div>
      </div>
      
      <!-- Courses Card -->
      <div class="bento-item col-1">
        <div class="bento-header">
          <h3>Kelas Ampu</h3>
          <div class="bento-icon" style="color:var(--brand-600);">${I.courses}</div>
        </div>
        <div class="bento-value">${K.DOSEN_COURSES.length}</div>
      </div>
      
      <!-- Total Students Card -->
      <div class="bento-item col-1">
        <div class="bento-header">
          <h3>Mhs Diajar</h3>
          <div class="bento-icon" style="color:var(--success);">${I.students}</div>
        </div>
        <div class="bento-value">${totalStudents}</div>
      </div>
      
      <!-- Advisees Card -->
      <div class="bento-item col-1">
        <div class="bento-header">
          <h3>Bimbingan PA</h3>
          <div class="bento-icon" style="color:var(--warning);">${I.profile}</div>
        </div>
        <div class="bento-value">${K.BIMBINGAN.length}</div>
      </div>
      
      <!-- Today's Classes Card -->
      <div class="bento-item col-1">
        <div class="bento-header">
          <h3>Kelas Hari Ini</h3>
          <div class="bento-icon" style="color:var(--info);">${I.schedule}</div>
        </div>
        <div class="bento-value">${todayClasses.length}</div>
      </div>
      
      <!-- Chart Card (Span 2 cols, Span 2 rows) -->
      <div class="bento-item col-2 row-2 bento-chart">
        <div class="bento-header" style="margin-bottom:0;">
          <div>
            <h3>Statistik Kehadiran Mahasiswa</h3>
            <div class="text-sm text-muted">Berdasarkan data minggu lalu</div>
          </div>
        </div>
        <div class="bento-chart-container">
          <canvas id="dosenDashboardChart"></canvas>
        </div>
      </div>
      
      <!-- Open Sessions Card (Span 2 cols, Span 2 rows) -->
      <div class="bento-item col-2 row-2">
        <div class="bento-header">
          <div>
            <h3>Buka Sesi Absensi</h3>
            <div class="text-xs text-muted">${todayName}</div>
          </div>
          <div class="bento-icon" style="color:var(--brand-600);">${I.attendance}</div>
        </div>
        <div class="list-group" style="flex:1; overflow-y:auto;">`;

    if (todayClasses.length === 0) {
      html += `<div style="text-align:center; padding:var(--sp-6); color:var(--stone-400);">Tidak ada kelas hari ini.</div>`;
    } else {
      todayClasses.forEach(c => {
        html += `<div class="list-item" style="align-items:center;">
          <div class="list-icon" style="background:var(--success);"></div>
          <div class="list-content">
            <div class="list-title">${c.name}</div>
            <div class="list-subtitle">${c.class} · ${c.start} · ${c.room}</div>
          </div>
          <button class="btn btn-primary" style="padding: 6px 12px; min-height: 0; font-size: 11px;" onclick="Kampusin._openSession('${c.code}','${c.class}')">Buka</button>
        </div>`;
      });
    }

    html += `</div>
      </div>
      
      <!-- At Risk Students Card (Span 4 cols) -->
      <div class="bento-item col-4 row-1" style="height:auto;">
        <div class="bento-header" style="margin-bottom: var(--sp-4);">
          <h3>Mahasiswa Perlu Perhatian</h3>
          <a href="#/students" data-nav="students" class="text-xs text-muted" style="font-weight:700;">Semua Bimbingan</a>

    const atRisk = K.BIMBINGAN.filter(s => s.ipk < 3.5).slice(0,4);
    if (atRisk.length === 0) {
      html += `<div class="text-sm text-muted">Semua mahasiswa bimbingan dalam performa baik.</div>`;
    } else {
      atRisk.forEach(s => {
        html += `<div class="list-item" style="flex:1; min-width:200px;">
          <div class="avatar" style="width:36px; height:36px; font-size:var(--fs-xs);">${s.name.split(' ').map(w=>w[0]).slice(0,2).join('')}</div>
          <div class="list-content">
            <div class="list-title" style="font-size:12px;">${s.name}</div>
            <div class="list-subtitle mono">${s.nim}</div>
          </div>
          <span class="badge ${s.ipk<3.0?'badge-danger':'badge-warning'}">IPK ${s.ipk.toFixed(2)}</span>
        </div>`;
      });
    }
        
    html += `</div>
      </div>
      
    </div>`;
    // --- BENTO GRID END ---
    return html;
  };

  VIEWS._dosenDashboard_afterRender = function() {
    const ctx = document.getElementById('dosenDashboardChart');
    if (!ctx) return;
    new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Hadir', 'Izin', 'Sakit', 'Alpha'],
        datasets: [{
          data: [75, 10, 5, 10],
          backgroundColor: ['#10b981', '#3b82f6', '#f59e0b', '#ef4444'],
          borderWidth: 0
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right', labels: { usePointStyle: true, boxWidth: 8 } }
        },
        cutout: '75%'
      }
    });
  };

  VIEWS._dosenAttendance = function() {
    let html = pageHead('Sesi Absensi', 'Buka dan kelola sesi absensi untuk kelas yang Anda ampu.');

    html += '<div class="flex flex-col gap-3">';
    K.DOSEN_SESSIONS.forEach(s => {
      html += `<div class="card card-pad">
        <div class="flex items-center justify-between gap-4" style="margin-bottom: var(--sp-3); flex-wrap:wrap;">
          <div>
            <div class="flex items-center gap-2" style="margin-bottom:4px;">
              <span class="badge badge-brand mono">${s.code}</span>
              <span class="badge badge-neutral">${s.class}</span>
            </div>
            <h3 style="font-size:var(--fs-md);">${s.name}</h3>
            <div class="text-xs text-muted" style="margin-top:2px;">${K.fmtDate(s.date)} · ${I.clock.replace('width="18"','width="13"').replace('height="18"','height="13"')} ${s.time} · ${s.room}</div>
          </div>
          <button class="btn btn-primary" style="min-height:44px;" onclick="Kampusin._openSession('${s.code}','${s.class}')">${I.attendance.replace('class="nav-icon"','width="18" height="18"')} Buka absensi</button>
        </div>
        <div class="progress" style="margin-bottom: var(--sp-2);"><div class="progress-bar" style="width:${Math.round(s.attended/s.total*100)}%"></div></div>
        <div class="flex justify-between text-xs text-muted"><span>${s.attended} dari ${s.total} mahasiswa</span><span>${Math.round(s.attended/s.total*100)}%</span></div>
      </div>`;
    });
    html += '</div>';
    return html;
  };

  /* ---------- toast helper ---------- */
  K._toast = function(msg) {
    let t = document.getElementById('__toast');
    if (!t) {
      t = document.createElement('div');
      t.id = '__toast';
      t.style.cssText = 'position:fixed; bottom: calc(var(--bottom-nav-h) + 20px); left:50%; transform:translateX(-50%); background: var(--stone-900); color:white; padding: var(--sp-3) var(--sp-5); border-radius: var(--r-md); font-size: var(--fs-sm); font-weight:500; z-index:1000; box-shadow: var(--shadow-lg); opacity:0; transition: opacity 200ms, transform 200ms; pointer-events:none;';
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.opacity = '1';
    t.style.transform = 'translateX(-50%) translateY(0)';
    clearTimeout(t._h);
    t._h = setTimeout(() => { t.style.opacity = '0'; }, 2400);
  };

  K._openSession = function(code, cls) {
    K._toast(`Sesi absensi ${code} (${cls}) dibuka. Mahasiswa dapat check-in sekarang.`);
  };

  // ---- Initial route ----
  routeFromHash();
})();
</script>
